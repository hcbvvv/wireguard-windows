name: CI
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Build
        run: .\build.bat
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: wireguard.exe
          path: amd64\wireguard.exe
